{% extends 'dondesong/base.html' %}

{% block content %}
<h2>Modifier profil hôpital</h2>

<form method="post">
    {% csrf_token %}

    <label>Nom :</label>
    <input type="text" name="nom" value="{{ hopital.nom }}" required>

    <label>Adresse :</label>
    <input type="text" name="adresse" value="{{ hopital.adresse }}" required>

    <label>Ville :</label>
    <input type="text" name="ville" value="{{ hopital.ville }}" required>

    <label>Téléphone :</label>
    <input type="tel" name="telephone" value="{{ hopital.telephone|default:'' }}">

    <label>Email :</label>
    <input type="email" name="email" value="{{ hopital.email|default:'' }}">

    <button type="submit">Enregistrer les modifications</button>
</form>

<!-- Message de confirmation si désactivation récente -->
{% if messages %}
    {% for message in messages %}
        <div style="background-color: #d4edda; border: 1px solid #28a745; border-radius: 5px; padding: 10px; margin-top: 15px; color: #155724;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

{% endblock %}
