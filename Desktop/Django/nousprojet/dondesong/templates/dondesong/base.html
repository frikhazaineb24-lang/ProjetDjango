{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mon Projet{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS perso -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <nav class="sidebar">
        <h4 class="text-white text-center py-3">DonDeSong</h4>

        <a href="{% url 'donneur' %}">Donneurs</a>
        <a href="{% url 'hopitaux' %}">Hôpitaux</a>
        <a href="{% url 'campagnes' %}">Campagnes</a>
        <a href="{% url 'dons' %}">Dons</a>
        <a href="{% url 'demandes' %}">Demandes</a>
        <a href="{% url 'register' %}">Inscription</a>

        {% if user.is_authenticated %}

    <a href="{% url 'logout' %}" class="btn btn-dark">
        Déconnexion
    </a>

{% else %}

    <a href="{% url 'login' %}" class="btn btn-dark">
        Connexion
    </a>

{% endif %}
    </nav>

        <!-- Page content -->
        <div class="content container mt-3">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</div>


</body>
</html>
