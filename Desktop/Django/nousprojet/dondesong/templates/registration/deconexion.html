{% extends 'dondesong/base.html' %}
{% block title %}Déconnexion{% endblock %}

  <div class="col-md-5 text-center">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <h4 class="mb-3">Vous avez été déconnecté.</h4>

      </div>
    </div>
  </div>

{% endblock %}
